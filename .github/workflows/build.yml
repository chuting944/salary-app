name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            libncurses6 \
            libncurses-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libssl-dev \
            libffi-dev \
            libsqlite3-dev \
            zlib1g-dev \
            autoconf \
            libtool \
            openjdk-17-jdk \
            zip

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Download Android SDK components
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # Accept all licenses
          yes | sdkmanager --licenses || true
          
          # Install required components
          sdkmanager --install "platforms;android-27" "build-tools;34.0.0" "platform-tools" "ndk;25.2.5" || true
          
          # Verify installation
          ls -la $ANDROID_HOME/build-tools/
          ls -la $ANDROID_HOME/platforms/

      - name: Install Python dependencies
        run: |
          pip install buildozer cython

      - name: Build debug APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROIDSDK: ${{ env.ANDROID_SDK_ROOT }}
          ANDROIDNDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.5
          ANDROIDAPI: 27
          ANDROIDMINAPI: 21
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          buildozer android debug --verbose 2>&1 || true
          
          # Find APK files
          find . -name "*.apk" -type f 2>/dev/null
          find .buildozer -name "*.apk" -type f 2>/dev/null || true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: salary-app-apk
          path: |
            **/*.apk
            .buildozer/**/bin/*.apk
            .buildozer/**/dists/**/*.apk
          retention-days: 7

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: .buildozer/**/*.log
        continue-on-error: true
