name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            libncurses6 \
            libncurses-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libssl-dev \
            libffi-dev \
            libsqlite3-dev \
            zlib1g-dev \
            autoconf \
            libtool \
            openjdk-17-jdk \
            zip \
            wget \
            unzip

      - name: Download and setup Android SDK
        run: |
          mkdir -p android-sdk
          cd android-sdk
          
          # Download command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          rm cmdline-tools.zip
          
          export ANDROID_HOME=$PWD
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # Accept licenses
          yes | sdkmanager --licenses 2>/dev/null || true
          
          # Install required components
          sdkmanager --install "platforms;android-27" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -5
          
          echo "ANDROID_HOME=$PWD" >> $GITHUB_ENV
          echo "ANDROIDSDK=$PWD" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$PWD/ndk/25.2.5" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          pip install buildozer cython

      - name: Build debug APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROIDSDK: ${{ env.ANDROIDSDK }}
          ANDROIDNDK: ${{ env.ANDROID_NDK_HOME }}
          ANDROIDAPI: 27
          ANDROIDMINAPI: 21
        run: |
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          buildozer android debug 2>&1 | tail -50
          
          echo "=== Finding APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          find .buildozer -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: salary-app-apk
          path: |
            .buildozer/**/dists/**/*.apk
            .buildozer/**/bin/**/*.apk
            **/salaryapp*.apk
          retention-days: 7

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: .buildozer/**/*.log
        continue-on-error: true
