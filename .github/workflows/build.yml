name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            libncurses6 \
            libncurses-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libssl-dev \
            libffi-dev \
            libsqlite3-dev \
            zlib1g-dev \
            autoconf \
            libtool \
            adb \
            openjdk-17-jdk

      - name: Install Python dependencies
        run: |
          pip install buildozer cython

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-27" "build-tools;27.0.3" "platform-tools"

      - name: Build debug APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROIDSDK: ${{ env.ANDROID_HOME }}
          ANDROIDAPI: 27
          ANDROIDMINAPI: 21
        run: |
          buildozer android debug --verbose 2>&1 || true
          find . -name "*.apk" -type f 2>/dev/null

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: salary-app-apk
          path: |
            **/*.apk
            .buildozer/**/*.apk
          retention-days: 7

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: .buildozer/**/*.log
        continue-on-error: true
