name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            libncurses6 \
            libncurses-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libssl-dev \
            libffi-dev \
            libsqlite3-dev \
            zlib1g-dev \
            autoconf \
            libtool \
            openjdk-17-jdk \
            zip \
            wget \
            unzip

      - name: Pre-setup Android SDK for Buildozer
        run: |
          # Buildozer downloads SDK to ~/.buildozer/android/platform/android-sdk/
          # We need to pre-install SDK tools there BEFORE buildozer runs
          
          mkdir -p ~/.buildozer/android/platform/android-sdk
          cd ~/.buildozer/android/platform/android-sdk
          
          # Download command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          rm cmdline-tools.zip
          
          export PATH=$PATH:$PWD/cmdline-tools/latest/bin
          export ANDROID_HOME=$PWD
          export ANDROID_SDK_ROOT=$PWD
          
          # Accept ALL licenses FIRST
          yes | sdkmanager --licenses 2>/dev/null || true
          
          # Install required SDK components for API 27 (Android 8.1)
          sdkmanager --install \
            "platforms;android-27" \
            "build-tools;34.0.0" \
            "platform-tools" \
            "ndk;25.2.5" 2>&1 | tail -10
          
          echo "=== SDK Installation Complete ==="
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools"

      - name: Install Python dependencies
        run: |
          pip install buildozer cython

      - name: Build debug APK
        env:
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
          ANDROIDSDK: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_NDK_HOME: /home/runner/.buildozer/android/platform/android-sdk/ndk/25.2.5
          ANDROIDAPI: 27
          ANDROIDMINAPI: 21
        run: |
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # Ensure licenses are accepted
          yes | sdkmanager --licenses 2>/dev/null || true
          
          echo "=== Starting Buildozer Build ==="
          buildozer android debug 2>&1
          
          echo "=== Finding APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          find ~/.buildozer -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: salary-app-apk
          path: |
            .buildozer/**/dists/**/*.apk
            .buildozer/**/bin/**/*.apk
            **/salaryapp*.apk
          retention-days: 7

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: .buildozer/**/*.log
        continue-on-error: true
